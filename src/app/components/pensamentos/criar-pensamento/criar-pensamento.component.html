<section class="container criar-pensamentos ff-inter">
    <header class="header">
        <h2>Registrar algo novo:</h2>
        <!--<h2>Adicione um <br> pensamento novo</h2>-->
        <form action="">
            <label for="pensamento">Adicione o texto</label>
            <input 
            type="textarea" 
            class="input" 
            id="pensamento"
            name="pensamento"
            placeholder="Digite o que há de novo",
            [(ngModel)]="pensamento.conteudo"
            >
            
            <label for="autoria">Autoria ou fonte</label>
            <input 
            type="text" 
            class="input" 
            id="autoria"
            name="autoria"
            placeholder="Digite a autoria ou fonte"
            [(ngModel)]="pensamento.autoria"
            >
            <label for="modelo">Selecione o modelo do card:</label>
            <div class="container-radio">
                <div class="radio-modelo">
                    <label for="modelo1">
                        <input
                        type="radio"
                        id="modelo1"
                        value="modelo1"
                        name="modelo-card"
                        [(ngModel)]="pensamento.modelo"
                        >
                        <div class="custom-radio">
                            <span></span>
                        </div>
                        <div>Modelo 1</div>
                    </label>
                    Previa:
                    <div class="modelo modelo1 ff-roboto-mono">
                        <img src="../../../../assets/imagens/modelo1.png" alt="Aspas azuis">
                        <p class="conteudo">{{ pensamento.conteudo }}</p>
                        <p class="autoria"><strong>{{ pensamento.autoria}}</strong></p>
                    </div>
                </div>

                <div class="radio-modelo">
                    <label for="modelo2">
                        <input
                        type="radio"
                        id="modelo2"
                        value="modelo2"
                        name="modelo-card"
                        [(ngModel)]="pensamento.modelo"
                        >
                        <div class="custom-radio">
                            <span></span>
                        </div>
                        <div>Modelo 2</div>
                    </label>
                    Previa:
                    <div class="modelo modelo1 ff-roboto-mono">
                        <img src="../../../../assets/imagens/modelo2.png" alt="Aspas azuis claro">
                        <p class="conteudo">{{ pensamento.conteudo }}</p>
                        <p class="autoria"><strong>{{ pensamento.autoria}}</strong></p>
                    </div>
                </div>

                <div class="radio-modelo">
                    <label for="modelo3">
                        <input
                        type="radio"
                        id="modelo3"
                        value="modelo3"
                        name="modelo-card"
                        [(ngModel)]="pensamento.modelo"
                        >
                        <div class="custom-radio">
                            <span></span>
                        </div>
                        <div>Modelo 3</div>
                    </label>
                    Previa:
                    <div class="modelo modelo3 ff-roboto-mono">
                        <img src="../../../../assets/imagens/modelo3.png" alt="Aspas verdes">
                        <p class="conteudo">{{ pensamento.conteudo }}</p>
                        <p class="autoria"><strong>{{ pensamento.autoria}}</strong></p>
                    </div>
                </div>
            </div>
            <div class="acoes">
                <button routerLink="/listarPensamento" (click)="criarPensamento()" class="botao">Salva</button>
                <button routerLink="/listarPensamento" (click)="cancelarPensamento()" class="botao">Cancelar</button>
            </div>
        </form>
    </header>
</section>
